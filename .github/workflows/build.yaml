name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^\s*version:\s+(.+?)\+').Matches.Groups[1].Value.Trim()
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "fzu_assistant-windows-v$version.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: fzu_assistant-windows-*.zip

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/app/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/key.properties
          echo "storeFile=ghaction-keystore.jks" >> android/app/key.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/ghaction-keystore.jks

      - name: Build split APKs
        run: flutter build apk --split-per-abi --release

      - name: Build universal APK
        run: flutter build apk --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: check
        run: |
          VERSION=$(grep -E '^\s*version:' pubspec.yaml | sed 's/.*:\s*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          PARENT_VERSION=$(git show HEAD~1:pubspec.yaml | grep -E '^\s*version:' | sed 's/.*:\s*//' | cut -d'+' -f1)
          echo "parent_tag=v$PARENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" = "$PARENT_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header --tag ${{ steps.check.outputs.tag }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      # Version changed → promote old pre-release to stable, then create new release
      - name: Promote old pre-release to stable
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.parent_tag }}
          prerelease: false
          make_latest: false
        continue-on-error: true

      - name: Create stable release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          prerelease: false
          make_latest: true
          files: |
            artifacts/windows-build/*.zip
            artifacts/android-build/*.apk

      # Version unchanged → update rolling pre-release
      - name: Update pre-release
        if: steps.check.outputs.changed == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          prerelease: true
          make_latest: false
          files: |
            artifacts/windows-build/*.zip
            artifacts/android-build/*.apk
