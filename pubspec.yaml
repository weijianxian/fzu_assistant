name: fzu_assistant
description: "福州大学一站式校园助手 — 课表、成绩、考试、校历，开箱即用。"
publish_to: 'none'
version: 1.0.6+9

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_hooks: ^0.21.3+1
  http: ^1.4.0
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  crypto: ^3.0.6
  image: ^4.5.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  html: ^0.15.4
  charset: ^2.0.1
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_staggered_grid_view: ^0.7.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
